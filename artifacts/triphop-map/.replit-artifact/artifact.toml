kind = "web"
previewPath = "/"
title = "TripHop Map"
version = "1.0.0"
id = "artifacts/triphop-map"
router = "path"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 21535

[services.development]
run = "pnpm --filter @workspace/triphop-map run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/triphop-map", "run", "build" ]
serve = "static"
publicDir = "artifacts/triphop-map/dist/public"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "21535"
BASE_PATH = "/"
